name: Generate Webinar Follow-up

on:
  schedule:
    # Every day at 7:00 UTC (8:00 CET / 9:00 CEST)
    - cron: '0 7 * * *'
  workflow_dispatch:
    inputs:
      transcript_file:
        description: 'Filename of transcript (e.g. 03_Vibe coding v praxi – 10.3.2026 přepis.md)'
        required: false
        type: string
      force:
        description: 'Force reprocess even if already processed'
        required: false
        type: boolean
        default: false

jobs:
  generate-follow-up:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout marketing-brain repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check for new transcripts and generate follow-ups
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          AIRTABLE_TOKEN: ${{ secrets.AIRTABLE_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          CONTENT_REPO: aibilitycz/content
          TRANSCRIPT_DIR: prepisy-webinaru-edu
          MANUAL_FILE: ${{ github.event.inputs.transcript_file || '' }}
          FORCE: ${{ github.event.inputs.force || 'false' }}
        run: node .github/scripts/generate-follow-up.mjs
